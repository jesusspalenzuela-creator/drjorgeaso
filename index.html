<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inóvixe | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- LOGIN -->
    <div id="seccion-login" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-900">Inóvixe SaaS</h2>
            <form id="form-login" class="space-y-4">
                <input type="text" id="login-usuario" placeholder="Usuario" class="w-full bg-gray-50 rounded-xl p-3 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full bg-gray-50 rounded-xl p-3 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition">Entrar</button>
            </form>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="seccion-panel" class="hidden p-8 max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">Bienvenido, <span id="nombre-cliente-titulo" class="text-blue-600 capitalize"></span></h1>
            <button id="btn-cerrar-sesion" class="text-gray-400 hover:text-red-500 transition">Cerrar Sesión</button>
        </div>

        <!-- TARJETAS MÉTRICAS -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><p class="text-gray-400 text-xs font-bold uppercase">Total Citas</p><h3 id="stat-total" class="text-3xl font-bold">0</h3></div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><p class="text-green-500 text-xs font-bold uppercase">Confirmadas</p><h3 id="stat-confirmadas" class="text-3xl font-bold">0</h3></div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><p class="text-yellow-500 text-xs font-bold uppercase">Pendientes</p><h3 id="stat-pendientes" class="text-3xl font-bold">0</h3></div>
            <button id="btn-abrir-modal" class="bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition shadow-lg shadow-blue-200">+ Nueva Cita</button>
        </div>

        <!-- TABLA -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                <h2 class="font-bold text-lg">Historial de Pacientes</h2>
                <button id="btn-refrescar" class="text-blue-600 font-semibold text-sm">Actualizar</button>
            </div>
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-400 font-bold uppercase text-xs">
                    <tr><th class="p-4">Paciente</th><th class="p-4">Teléfono</th><th class="p-4">Fecha</th><th class="p-4">Estado</th></tr>
                </thead>
                <tbody id="tabla-cuerpo" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-cita" class="fixed inset-0 bg-black bg-opacity-30 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Nueva Cita</h2>
            <form id="form-cita" class="space-y-4">
                <input type="hidden" id="form-profesional">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="form-nombres" placeholder="Nombres" required class="bg-gray-50 p-3 rounded-xl w-full border">
                    <input type="text" id="form-apellidos" placeholder="Apellidos" required class="bg-gray-50 p-3 rounded-xl w-full border">
                </div>
                <input type="date" id="form-fecha" required class="bg-gray-50 p-3 rounded-xl w-full border">
                <textarea id="form-motivo" placeholder="Motivo" class="bg-gray-50 p-3 rounded-xl w-full border"></textarea>
                <div class="flex gap-4">
                    <button type="button" id="btn-cerrar-modal" class="w-full text-gray-500">Cancelar</button>
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
