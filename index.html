<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinovix | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(20, 30, 48, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 12px 40px rgba(56, 189, 248, 0.15);
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border: none;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(14, 165, 233, 0.3);
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(14, 165, 233, 0.5);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            color: white;
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.4);
        }
        .table-header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .table-row {
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .table-row:hover {
            background: rgba(255,255,255,0.03);
        }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge-confirmada { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-cancelada { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-reprogramada { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-esperando { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-pendiente { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.15); }

        .modal-overlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        input, textarea, select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            transition: all 0.2s;
            width: 100%;
            outline: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased overflow-x-hidden bg-[#0b0f1a]">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none w-80"></div>

    <!-- LOGIN -->
    <div id="seccion-login" class="flex items-center justify-center min-h-screen p-4 relative z-20">
        <div class="w-full max-w-md modal-content rounded-2xl p-8 md:p-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl shadow-xl shadow-cyan-900/30 mb-5">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <h1 class="text-4xl font-black tracking-tight bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">Clinovix</h1>
                <p class="text-slate-400 font-medium mt-1 text-sm">Gestión profesional de citas</p>
            </div>
            <form id="form-login" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">Usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        </span>
                        <input type="text" id="login-usuario" placeholder="Tu usuario" required class="pl-11">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </span>
                        <input type="password" id="login-password" placeholder="••••••••" required class="pl-11">
                    </div>
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl font-bold text-lg tracking-wide">Acceder al panel</button>
            </form>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="seccion-panel" class="hidden relative min-h-screen">
        <canvas id="particle-canvas" class="absolute inset-0 z-0 pointer-events-none opacity-30"></canvas>

        <!-- NAVBAR -->
        <nav class="relative z-10 glass sticky top-0 border-b border-white/5 shadow-2xl">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-900/30">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                    </div>
                    <h1 class="text-xl font-black tracking-tight text-white">Clinovix <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-300">DASH</span></h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="nombre-cliente-titulo" class="text-sm font-semibold text-cyan-200/80 bg-white/5 px-4 py-2 rounded-full border border-white/10 hidden sm:block"></span>
                    <button id="btn-cerrar-sesion" class="flex items-center gap-2 text-sm btn-danger px-4 py-2 rounded-xl font-bold">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Salir
                    </button>
                </div>
            </div>
        </nav>

        <main class="relative z-10 max-w-7xl mx-auto px-6 py-10">
            <!-- Botones de acción -->
            <div class="flex flex-wrap gap-3 mb-8 justify-end">
                <button id="btn-configurar-columnas" class="btn-secondary flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                    Vistas
                </button>
                <button id="btn-agregar-campo" class="btn-secondary flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                    Nuevo Campo
                </button>
                <button id="btn-refrescar" class="btn-secondary flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    Sincronizar
                </button>
                <button id="btn-abrir-modal" class="btn-primary flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    Nueva Cita
                </button>
            </div>

            <!-- Estadísticas -->
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-10">
                <div class="stat-card p-5 rounded-2xl">
                    <p class="stat-label">Total Citas</p>
                    <p id="stat-total" class="stat-number">0</p>
                </div>
                <div class="stat-card p-5 rounded-2xl relative overflow-hidden">
                    <div class="absolute -right-8 -top-8 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl"></div>
                    <p class="stat-label text-emerald-400">Confirmadas</p>
                    <p id="stat-confirmadas" class="stat-number text-emerald-400" style="-webkit-text-fill-color: #34d399;">0</p>
                </div>
                <div class="stat-card p-5 rounded-2xl relative overflow-hidden">
                    <div class="absolute -right-8 -top-8 w-24 h-24 bg-red-500/10 rounded-full blur-2xl"></div>
                    <p class="stat-label text-red-400">Canceladas</p>
                    <p id="stat-canceladas" class="stat-number text-red-400" style="-webkit-text-fill-color: #f87171;">0</p>
                </div>
                <div class="stat-card p-5 rounded-2xl relative overflow-hidden">
                    <div class="absolute -right-8 -top-8 w-24 h-24 bg-amber-500/10 rounded-full blur-2xl"></div>
                    <p class="stat-label text-amber-400">Reprogramadas</p>
                    <p id="stat-reprogramadas" class="stat-number text-amber-400" style="-webkit-text-fill-color: #fbbf24;">0</p>
                </div>
                <div class="stat-card p-5 rounded-2xl flex flex-col items-center justify-center text-center">
                    <div class="w-10 h-10 bg-emerald-500/20 rounded-full flex items-center justify-center mb-2">
                        <div class="w-4 h-4 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_20px_rgba(52,211,153,0.5)]"></div>
                    </div>
                    <p class="stat-label">Estado</p>
                    <p class="text-sm font-bold text-emerald-400">En línea</p>
                </div>
            </div>

            <!-- Tabla -->
            <div class="glass-card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto p-1">
                    <table class="w-full min-w-max text-left whitespace-nowrap">
                        <thead id="tabla-cabecera" class="table-header text-slate-400 uppercase text-[10px] tracking-widest font-extrabold"></thead>
                        <tbody id="tabla-cuerpo" class="divide-y divide-white/5 text-[13px] font-medium"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: Columnas -->
    <div id="modal-columnas" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[60]">
        <div class="modal-content rounded-2xl w-full max-w-md p-8 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <div>
                    <h2 class="text-2xl font-black text-white tracking-tight">Ocultar Columnas</h2>
                    <p class="text-sm text-slate-400 font-medium mt-1">Selecciona qué datos quieres ver</p>
                </div>
                <button id="btn-cerrar-modal-columnas" class="text-slate-500 hover:text-red-400 bg-white/5 hover:bg-red-500/10 rounded-full p-2 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div id="lista-columnas" class="space-y-2 mb-6"></div>
            <button id="btn-guardar-columnas" class="w-full btn-primary py-4 rounded-xl font-bold text-lg">Aplicar Cambios</button>
        </div>
    </div>

    <!-- MODAL: Cita -->
    <div id="modal-cita" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-50">
        <div class="modal-content rounded-2xl w-full max-w-4xl p-8 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                <h2 id="titulo-modal" class="text-3xl font-black text-white tracking-tight">Nueva Cita</h2>
                <button id="btn-cerrar-modal" class="text-slate-500 hover:text-red-400 bg-white/5 hover:bg-red-500/10 rounded-full p-2 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="form-cita">
                <div id="contenedor-campos-dinamicos" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
                <div class="flex gap-4 pt-6 mt-6 border-t border-white/10">
                    <button type="button" id="btn-cerrar-modal-secundario" class="flex-1 btn-secondary py-4 rounded-xl font-bold">Cancelar</button>
                    <button type="submit" class="flex-[2] btn-primary py-4 rounded-xl font-bold text-lg">Guardar Información</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: Nuevo Campo -->
    <div id="modal-nuevo-campo" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[70]">
        <div class="modal-content rounded-2xl w-full max-w-md p-8">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="text-2xl font-black text-white tracking-tight">Nuevo Campo</h2>
                <button id="btn-cerrar-modal-campo" class="text-slate-500 hover:text-red-400 bg-white/5 hover:bg-red-500/10 rounded-full p-2 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="form-nuevo-campo" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">Nombre del campo</label>
                    <input type="text" id="campo-nombre" placeholder="Ej: Tipo de Consulta" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1.5">Valor por defecto <span class="text-slate-500 font-normal">(opcional)</span></label>
                    <input type="text" id="campo-valor-default" placeholder="Valor que aparecerá automáticamente">
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl font-bold text-lg">Crear Campo</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        (function() {
            function initParticles() {
                const panel = document.getElementById('seccion-panel');
                if (!panel || panel.classList.contains('hidden')) return;
                const canvas = document.getElementById('particle-canvas');
                if (!canvas || canvas.dataset.initialized) return; 
                const ctx = canvas.getContext('2d');
                let particles = [];
                function resize() { canvas.width = panel.offsetWidth; canvas.height = panel.offsetHeight; }
                window.addEventListener('resize', resize); resize();
                for (let i = 0; i < 60; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 0.5,
                        speedX: (Math.random() - 0.5) * 0.3, speedY: (Math.random() - 0.5) * 0.3 - 0.2, 
                        color: ['rgba(56,189,248,0.3)', 'rgba(14,165,233,0.2)', 'rgba(147,197,253,0.1)'][Math.floor(Math.random() * 3)]
                    });
                }
                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let p of particles) {
                        p.x += p.speedX; p.y += p.speedY;
                        if (p.x < -5) p.x = canvas.width + 5; if (p.x > canvas.width + 5) p.x = -5;
                        if (p.y < -5) p.y = canvas.height + 5; if (p.y > canvas.height + 5) p.y = -5;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = p.color; ctx.fill();
                    }
                    requestAnimationFrame(animate);
                }
                canvas.dataset.initialized = 'true'; animate();
            }
            document.getElementById('form-login').addEventListener('submit', () => setTimeout(initParticles, 150));
            window.addEventListener('load', () => { if (!document.getElementById('seccion-panel').classList.contains('hidden')) initParticles(); });
        })();
    </script>
</body>
</html>
