<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inóvixe | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <!-- LOGIN (Se mantiene igual) -->
    <div id="seccion-login" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-3xl font-black text-slate-900 mb-6">Inóvixe</h2>
            <form id="form-login" class="space-y-4">
                <input type="text" id="login-usuario" placeholder="Usuario" class="w-full bg-slate-50 p-3 rounded-lg border">
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full bg-slate-50 p-3 rounded-lg border">
                <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Entrar</button>
            </form>
        </div>
    </div>

    <!-- PANEL (sidebar + vistas) -->
    <div id="seccion-panel" class="hidden flex w-full">
        <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col">
            <h1 class="text-xl font-bold mb-10 border-b border-slate-700 pb-4">Inóvixe SaaS</h1>
            <nav class="space-y-4 flex-1">
                <button onclick="showView('view-dashboard')" class="block w-full text-left p-3 hover:bg-slate-800 rounded">Dashboard</button>
                <button onclick="showView('view-citas')" class="block w-full text-left p-3 hover:bg-slate-800 rounded">Ver Citas</button>
                <button onclick="showView('view-crear')" class="block w-full text-left p-3 hover:bg-slate-800 rounded">Nueva Cita</button>
            </nav>
            <button id="btn-cerrar-sesion" class="text-slate-500 text-sm p-3">Cerrar Sesión</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <!-- DASHBOARD VIEW -->
            <section id="view-dashboard" class="view active">
                <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow border border-slate-100"><p class="text-xs text-slate-400">Total</p><h3 id="stat-total" class="text-2xl font-bold">0</h3></div>
                    <div class="bg-white p-6 rounded-xl shadow border border-slate-100"><p class="text-xs text-green-500">Confirmadas</p><h3 id="stat-confirmadas" class="text-2xl font-bold">0</h3></div>
                    <div class="bg-white p-6 rounded-xl shadow border border-slate-100"><p class="text-xs text-yellow-500">Pendientes</p><h3 id="stat-pendientes" class="text-2xl font-bold">0</h3></div>
                </div>
            </section>

            <!-- CITAS VIEW -->
            <section id="view-citas" class="view hidden">
                <h2 class="text-2xl font-bold mb-6">Listado de Citas</h2>
                <div class="bg-white rounded-xl shadow border border-slate-100 p-6">
                    <table class="w-full text-left text-sm">
                        <thead class="text-slate-400 uppercase font-bold">
                            <tr><th class="p-3">Paciente</th><th class="p-3">Fecha</th><th class="p-3">Estado</th></tr>
                        </thead>
                        <tbody id="tabla-cuerpo" class="divide-y"></tbody>
                    </table>
                </div>
            </section>

            <!-- NUEVA CITA VIEW -->
            <section id="view-crear" class="view hidden">
                <h2 class="text-2xl font-bold mb-6">Registrar Nueva Cita</h2>
                <form id="form-cita" class="bg-white p-8 rounded-xl shadow border max-w-lg space-y-4">
                    <input type="hidden" id="form-profesional">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="form-nombres" placeholder="Nombres" required class="bg-slate-50 p-3 rounded-lg border">
                        <input type="text" id="form-apellidos" placeholder="Apellidos" required class="bg-slate-50 p-3 rounded-lg border">
                    </div>
                    <input type="date" id="form-fecha" required class="bg-slate-50 p-3 rounded-lg border w-full">
                    <textarea id="form-motivo" placeholder="Motivo" class="bg-slate-50 p-3 rounded-lg border w-full"></textarea>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Registrar Cita</button>
                </form>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
