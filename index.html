<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finovixe | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
        }

        /* Efecto sutil para el fondo del login */
        .login-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        /* Tarjetas con hover elevado */
        .card-hover {
            transition: all 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Filas de tabla interactivas */
        .table-row-hover:hover {
            background-color: #f1f5f9;
            transition: background-color 0.15s;
        }

        /* Scrollbar minimalista */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <!-- SECCIÓN LOGIN -->
    <div id="seccion-login" class="login-bg flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl p-8 md:p-10 border border-white/20">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-700 to-indigo-800 rounded-2xl shadow-xl shadow-blue-900/20 mb-5">
                    <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Finovixe</h1>
                <p class="text-slate-500 font-medium mt-1">Panel de gestión profesional</p>
            </div>

            <form id="form-login" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Usuario</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        <input type="text" id="login-usuario" placeholder="Tu usuario" required
                               class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" id="login-password" placeholder="••••••••" required
                               class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-700 to-indigo-800 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-900/20 hover:shadow-xl hover:scale-[1.02] transition-all">
                    Acceder al panel
                </button>
            </form>

            <p class="text-center text-xs text-slate-400 mt-6">Plataforma segura · v2.0</p>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="seccion-panel" class="hidden">
        <!-- NAVBAR SUPERIOR -->
        <nav class="bg-slate-900 text-white shadow-xl sticky top-0 z-40 border-b border-slate-700/50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-700 rounded-lg flex items-center justify-center shadow-md">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tight">FINOVIXE <span class="text-blue-400">PRO</span></h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="nombre-cliente-titulo" class="text-sm font-medium text-slate-300 bg-slate-800 px-4 py-1.5 rounded-full"></span>
                    <button id="btn-cerrar-sesion" 
                            class="flex items-center gap-2 text-sm bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-all font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Salir
                    </button>
                </div>
            </div>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- CABECERA Y BOTONES -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-4">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Agenda Médica</h2>
                    <p class="text-slate-500 font-medium mt-1">Panel de control centralizado</p>
                </div>
                <div class="flex gap-3 w-full sm:w-auto">
                    <button id="btn-refrescar" 
                            class="flex items-center gap-2 px-5 py-3 bg-white border border-slate-200 rounded-xl font-semibold text-slate-700 shadow-sm hover:shadow-md hover:border-slate-300 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Sincronizar
                    </button>
                    <button id="btn-abrir-modal" 
                            class="flex items-center gap-2 px-5 py-3 bg-gradient-to-r from-blue-700 to-indigo-800 text-white rounded-xl font-bold shadow-lg shadow-blue-900/20 hover:shadow-xl hover:scale-[1.02] transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Nueva Cita
                    </button>
                </div>
            </div>

            <!-- TARJETAS DE ESTADÍSTICAS -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <!-- Total Citas -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm card-hover flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total Citas</p>
                        <h3 id="stat-total" class="text-3xl font-extrabold text-slate-900">0</h3>
                    </div>
                </div>

                <!-- Confirmadas (verde) -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm card-hover flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-emerald-500 text-xs font-bold uppercase tracking-wider">Confirmadas</p>
                        <h3 id="stat-confirmadas" class="text-3xl font-extrabold text-emerald-600">0</h3>
                    </div>
                </div>

                <!-- Estado del sistema (verde/rojo según convenga) -->
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm card-hover flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Estado</p>
                        <h3 class="text-lg font-bold text-emerald-600">Sistema Activo</h3>
                    </div>
                </div>
            </div>

            <!-- TABLA DE CITAS -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="tabla-cabecera" class="bg-slate-50 border-b-2 border-slate-200 text-slate-500 uppercase text-[10px] tracking-widest font-bold"></thead>
                        <tbody id="tabla-cuerpo" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL CENTRADO EXACTAMENTE -->
    <div id="modal-cita" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-3xl shadow-2xl overflow-y-auto max-h-[90vh] border border-slate-100">
            <div class="flex justify-between items-start mb-6">
                <h2 id="titulo-modal" class="text-2xl font-extrabold text-slate-900">Nueva Cita</h2>
                <button id="btn-cerrar-modal" class="text-slate-400 hover:text-slate-600 transition p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="form-cita" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="form-identificacion" placeholder="Identificación" required class="col-span-2 p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="text" id="form-nombres" placeholder="Nombres" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="text" id="form-apellidos" placeholder="Apellidos" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="number" id="form-edad" placeholder="Edad" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="text" id="form-telefono" placeholder="Teléfono" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="date" id="form-fecha" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="time" id="form-hora" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <input type="text" id="form-profesional" placeholder="Profesional" required class="col-span-2 p-4 rounded-xl bg-blue-50 border border-blue-200 font-semibold text-blue-900 placeholder-blue-300 focus:ring-2 focus:ring-blue-600 outline-none transition">
                <textarea id="form-motivo" placeholder="Motivo de la consulta" class="col-span-2 p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none transition" rows="2"></textarea>
                
                <div id="contenedor-campos-plantilla" class="col-span-2 grid grid-cols-2 gap-4 border-t pt-4"></div>
                
                <div class="col-span-2 border-t pt-4">
                    <button type="button" id="btn-agregar-campo" class="text-xs font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg transition flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Añadir campo permanente
                    </button>
                    <div id="contenedor-campos" class="mt-4 space-y-2"></div>
                </div>

                <div class="col-span-2 flex gap-4 pt-4">
                    <button type="button" id="btn-cerrar-modal" class="flex-1 p-4 rounded-xl font-bold text-slate-400 hover:bg-slate-50 border border-slate-200 transition">Cancelar</button>
                    <button type="submit" class="flex-1 p-4 rounded-xl font-bold bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg hover:shadow-xl hover:from-blue-800 hover:to-indigo-900 transition">
                        Guardar cita
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
