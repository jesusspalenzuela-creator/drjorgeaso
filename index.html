<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finovixe | Gestión Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <!-- LOGIN -->
    <div id="seccion-login" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-900 mb-6">Finovixe <span class="text-blue-600">SaaS</span></h1>
        <form id="form-login" class="space-y-4">
            <input type="text" id="login-usuario" placeholder="Usuario" class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-xl font-semibold hover:bg-slate-800 transition">Entrar</button>
        </form>
        <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Usuario o contraseña incorrectos</p>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="seccion-panel" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-slate-400 text-sm">Dashboard de Gestión</p>
                <h1 class="text-3xl font-bold text-slate-900" id="nombre-cliente-titulo"></h1>
            </div>
            <button id="btn-cerrar-sesion" class="text-slate-400 hover:text-red-600 transition text-sm font-semibold">Cerrar Sesión</button>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total Citas</p>
                <h3 id="stat-total" class="text-3xl font-bold mt-2">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-green-500 text-xs font-bold uppercase tracking-wider">Confirmadas</p>
                <h3 id="stat-confirmadas" class="text-3xl font-bold mt-2">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <button id="btn-abrir-modal" class="w-full h-full bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition">+ Nueva Cita</button>
            </div>
        </div>

        <!-- Tabla -->
        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-lg">Agenda Reciente</h2>
                <button id="btn-refrescar" class="text-blue-600 text-sm font-semibold hover:underline">Refrescar Lista</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 text-slate-400 uppercase text-xs tracking-widest font-bold">
                        <tr><th class="p-6">Paciente</th><th class="p-6">Teléfono</th><th class="p-6">Fecha/Hora</th><th class="p-6">Profesional</th><th class="p-6">Motivo</th><th class="p-6">Estado</th></tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-cita" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-6">Programar Nueva Cita</h2>
            <form id="form-cita" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="form-identificacion" placeholder="DNI/Cédula" required class="bg-slate-50 p-4 rounded-xl border w-full">
                    <input type="number" id="form-edad" placeholder="Edad" required class="bg-slate-50 p-4 rounded-xl border w-full">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="form-nombres" placeholder="Nombres" required class="bg-slate-50 p-4 rounded-xl border w-full">
                    <input type="text" id="form-apellidos" placeholder="Apellidos" required class="bg-slate-50 p-4 rounded-xl border w-full">
                </div>
                <input type="text" id="form-telefono" placeholder="Teléfono" required class="bg-slate-50 p-4 rounded-xl border w-full">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="form-fecha" required class="bg-slate-50 p-4 rounded-xl border w-full">
                    <input type="time" id="form-hora" required class="bg-slate-50 p-4 rounded-xl border w-full">
                </div>
                <input type="text" id="form-profesional-input" placeholder="Nombre del Profesional (Manual)" required class="bg-blue-50 p-4 rounded-xl border border-blue-200 w-full font-bold text-blue-900">
                <textarea id="form-motivo" placeholder="Motivo de la consulta" class="bg-slate-50 p-4 rounded-xl border w-full"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="button" id="btn-cerrar-modal" class="w-full text-slate-400">Cancelar</button>
                    <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
