<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Citas | Inóvixe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Panel de Gestión de Citas</h1>
        
        <div class="overflow-x-auto">
            <table class="min-w-full table-auto">
                <thead class="bg-gray-200">
                    <tr id="tabla-cabecera" class="text-left text-sm font-semibold text-gray-700">
                        </tr>
                </thead>
                <tbody id="tabla-cuerpo" class="text-sm text-gray-600">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
