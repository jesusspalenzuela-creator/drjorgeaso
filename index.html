<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finovixe | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animaciones y mejoras personalizadas */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .gradient-nav {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .sticky-header th {
            position: sticky;
            top: 0;
            background-color: #f8fafc;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50/70 min-h-screen font-sans antialiased">

    <!-- ========== PANTALLA DE LOGIN ========== -->
    <div id="seccion-login" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border border-white/50 overflow-hidden">
            <div class="p-8 md:p-10">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-200 mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900">Finovixe <span class="text-indigo-600">PRO</span></h1>
                    <p class="text-slate-500 mt-2">Gestión profesional de citas</p>
                </div>
                <form id="form-login" class="space-y-4">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input type="text" id="login-usuario" placeholder="Usuario" required 
                               class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all duration-200">
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password" id="login-password" placeholder="Contraseña" required 
                               class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all duration-200">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl font-bold hover:bg-indigo-700 transition-all duration-200 shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transform hover:-translate-y-0.5">
                        Acceder
                    </button>
                </form>
                <p class="text-xs text-slate-400 text-center mt-6">Panel exclusivo para profesionales autorizados</p>
            </div>
        </div>
    </div>

    <!-- ========== PANEL PRINCIPAL ========== -->
    <div id="seccion-panel" class="hidden">
        <!-- Navegación -->
        <nav class="gradient-nav text-white shadow-xl sticky top-0 z-40 backdrop-blur-md bg-opacity-90">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight">FINOVIXE <span class="text-indigo-400">PRO</span></h1>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="nombre-cliente-titulo" class="text-sm font-medium text-white/80 bg-white/10 px-3 py-1 rounded-full"></span>
                    <button id="btn-cerrar-sesion" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-all duration-200 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Salir
                    </button>
                </div>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- Cabecera con acciones -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-bold text-slate-900">Agenda Médica</h2>
                    <p class="text-slate-500 mt-1">Bienvenido a tu panel de control central.</p>
                </div>
                <div class="flex gap-3">
                    <button id="btn-refrescar" class="px-5 py-3 bg-white border border-slate-200 rounded-2xl font-medium text-slate-700 shadow-sm hover:shadow-md transition-all duration-200 flex items-center gap-2 hover:bg-slate-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Sincronizar
                    </button>
                    <button id="btn-abrir-modal" class="px-5 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all duration-200 flex items-center gap-2 hover:shadow-indigo-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Nueva Cita
                    </button>
                </div>
            </div>

            <!-- Tarjetas de estadísticas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all duration-200 flex items-center gap-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-wide">Total Citas</p>
                        <h3 id="stat-total" class="text-3xl font-black text-slate-900">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all duration-200 flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-indigo-400 text-xs font-bold uppercase tracking-wide">Confirmadas</p>
                        <h3 id="stat-confirmadas" class="text-3xl font-black text-indigo-600">0</h3>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all duration-200 flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-emerald-400 text-xs font-bold uppercase tracking-wide">Estado</p>
                        <h3 class="text-lg font-bold text-emerald-600">Sistema Activo</h3>
                    </div>
                </div>
            </div>

            <!-- Tabla de citas -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto max-h-[60vh] overflow-y-auto">
                    <table class="w-full text-left">
                        <thead id="tabla-cabecera" class="bg-slate-50/90 backdrop-blur-sm sticky top-0 text-slate-500 uppercase text-[10px] tracking-widest font-bold"></thead>
                        <tbody id="tabla-cuerpo" class="divide-y divide-slate-50 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ========== MODAL DE CITA ========== -->
    <div id="modal-cita" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50 animate-fadeIn">
        <div class="bg-white rounded-3xl w-full max-w-3xl shadow-2xl overflow-y-auto max-h-[90vh] border border-white/20">
            <div class="p-8">
                <h2 id="titulo-modal" class="text-2xl font-black text-slate-900 mb-6">Nueva Cita</h2>
                <form id="form-cita" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="form-identificacion" placeholder="Identificación" required class="col-span-2 p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="text" id="form-nombres" placeholder="Nombres" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="text" id="form-apellidos" placeholder="Apellidos" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="number" id="form-edad" placeholder="Edad" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="text" id="form-telefono" placeholder="Teléfono" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="date" id="form-fecha" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="time" id="form-hora" required class="p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition">
                        <input type="text" id="form-profesional" placeholder="Profesional" required class="col-span-2 p-4 rounded-xl bg-indigo-50 border border-indigo-200 font-bold text-indigo-900 focus:ring-2 focus:ring-indigo-400 outline-none">
                        <textarea id="form-motivo" placeholder="Motivo de la consulta" class="col-span-2 p-4 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none transition" rows="3"></textarea>
                    </div>

                    <!-- Campos de plantilla dinámicos -->
                    <div id="contenedor-campos-plantilla" class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4"></div>

                    <!-- Sección para añadir campos permanentes -->
                    <div class="border-t border-slate-100 pt-4">
                        <button type="button" id="btn-agregar-campo" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg hover:bg-indigo-100 transition-all flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Añadir campo permanente
                        </button>
                        <div id="contenedor-campos" class="mt-4 space-y-2"></div>
                    </div>

                    <div class="flex gap-4 pt-4">
                        <button type="button" id="btn-cerrar-modal" class="flex-1 p-4 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all duration-200">Cancelar</button>
                        <button type="submit" class="flex-1 p-4 rounded-xl font-bold bg-indigo-600 text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all duration-200 hover:shadow-indigo-300">
                            Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
